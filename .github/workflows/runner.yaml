name: Run all jobs

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  pages: write
  id-token: write

jobs:
  website:
    name: Website
    uses: ./.github/workflows/website.yaml

  linux:
    name: Linux
    uses: ./.github/workflows/linux.yaml

  macos:
    name: MacOS
    uses: ./.github/workflows/macos.yaml
